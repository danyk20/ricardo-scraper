name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "camoufox==0.4.11" "playwright==1.60.0" "orjson" "requests" "platformdirs" \
                      "pytest~=9.1" "pytest-cov~=7.1" "ruff~=0.15" "mypy~=2.1"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy ricardo_scraper.py

      - name: Unit tests (no network/browser, e2e excluded)
        run: pytest
